# Render Blueprint — static site
# Service name becomes: https://utoronto-ca.onrender.com
# Docs: https://render.com/docs/blueprint-spec
#
# Monorepo: if this project is not the Git root, set rootDir (e.g. rootDir: websites).

services:
  - type: web
    name: utoronto-ca
    runtime: static
    buildCommand: 'echo "Static site — no build"'
    staticPublishPath: .
    envVars:
      - key: SKIP_INSTALL_DEPS
        value: "true"
    # Non-file paths serve index.html (static files like /styles.css are still served as files).
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
